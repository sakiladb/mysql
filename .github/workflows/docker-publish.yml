name: Docker

on:
  push:
    branches: [ "master" ]
    # Publish semver tags as releases. The MySQL version to build is derived
    # from the tag, e.g. v8.0.1 builds MySQL 8, v5.7.1 builds MySQL 5.7 (see the
    # "Determine MySQL version" step).
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]
  # Manual build of an arbitrary version (smoke test only, never publishes).
  workflow_dispatch:
    inputs:
      mysql_version:
        description: "MySQL version to build (e.g. 5.7, 8). Smoke test, no publish."
        required: false
        default: ""

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # The newest MySQL version label: the single source of truth for which release
  # gets the `latest` tag. Bump this when releasing a new newest version.
  LATEST_VERSION: "8"


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Determine which MySQL version to build, as a "version label" that is both
      # the published Docker tag and the `mysql:<label>` base image:
      #   - tag push (v8.0.1)         -> the tag's label (8)
      #   - manual run with an input  -> that input
      #   - branch push / PR          -> LATEST_VERSION (build the newest)
      # MySQL's own versioning is irregular: 5.6/5.7 used the minor as the de-facto
      # major (so we keep `5.6`/`5.7`), while 8.0+ adopted real major versions
      # (so `8`, later `9`, track the newest minor of that series via `mysql:8`).
      # The label drives the build-arg, the published tag, and the platform set.
      - name: Determine MySQL version
        id: myver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.mysql_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            label="$INPUT_VERSION"
          elif [ "$REF_TYPE" = "tag" ]; then
            ver="${REF_NAME#v}"          # v8.0.1 -> 8.0.1 ; v5.6.1 -> 5.6.1
            major="${ver%%.*}"           # 8 ; 5
            if [ "$major" = "5" ]; then
              rest="${ver#*.}"           # 6.1
              label="${major}.${rest%%.*}"   # 5.6 (legacy: keep major.minor)
            else
              label="$major"             # 8, 9 (modern: major only)
            fi
          else
            label="$LATEST_VERSION"
          fi
          # Validate: digits with at most one dot (guards the mysql:<label> base
          # image ref and the published tag against bad input / injection).
          case "$label" in
            ''|*[!0-9.]*|*.*.*) echo "::error::invalid MySQL version label: '$label'"; exit 1 ;;
          esac
          # 5.6 and 5.7 predate MySQL's arm64 images and ship amd64-only.
          case "$label" in
            5.6|5.7) platforms="linux/amd64" ;;
            *)       platforms="linux/amd64,linux/arm64" ;;
          esac
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"
          echo "Building MySQL version: ${label} (platforms: ${platforms})"

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      # Pinned to v3 (cosign v2.x) so we get the current Sigstore TUF root.
      - name: Install cosign
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      # Login against Docker Hub
      # https://github.com/docker/login-action
      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Login against GitHub Container Registry
      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          # Never auto-assign `latest`; emit our computed label and (for the
          # newest version only) `latest` explicitly below. MySQL's irregular
          # versioning means semver `{{major}}` can't produce these tags, so we
          # drive them from the version-label step.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.myver.outputs.label }},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.myver.outputs.label == env.LATEST_VERSION }}
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            MYSQL_VERSION=${{ steps.myver.outputs.label }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.myver.outputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # Sign the resulting Docker image digest except on PRs.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        # cosign v2 keyless signing uses the GHA OIDC token automatically
        # (no COSIGN_EXPERIMENTAL needed). --yes skips v2's interactive
        # confirmation prompt, which would otherwise hang in CI.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "$TAGS" | xargs -I {} cosign sign --yes {}@"$DIGEST"
